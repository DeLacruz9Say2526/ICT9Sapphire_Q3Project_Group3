    <div id="MC" class="container container-fluid">

                <option value="1">Recto</option>
                <option value="2">Legarda</option>
                <option value="3">Pureza</option>
                <option value="4">V. Mapa</option>

                <option value="8">Araneta Center-Cubao</option>

                <option value="11">Santolan</option>
                <option value="12">Marikina-Pasig</option>
                <option value="13">Antipolo</option>
            </select>

                
            <h3>DROP-OFF LOCATION</h3>
            <select id="dropOff" class="form-select form-select-sm" aria-label=".form-select-sm example">
                <option selected>Choose drop-off location</option>
                <option value="1">Recto</option>
                <option value="2">Legarda</option>
                <option value="3">Pureza</option>
                <option value="4">V. Mapa</option>
                <option value="5">J. Ruiz</option>
                <option value="6">Gilmore</option>
                <option value="7">Betty Go-Belmonte</option>
                <option value="8">Araneta Center-Cubao</option>
                <option value="9">Anonas</option>
                <option value="10">Katipunan</option>
                <option value="11">Santolan</option>
                <option value="12">Marikina-Pasig</option>
                <option value="13">Antipolo</option>
            </select>

            <div id="buttons">
            <button type="button" class="btn btn-primary">Regular Fare</button>
            <button type="button" class="btn btn-info">Discounted Fare</button>
            </div>
                
        </div>

        <div id="fare">
            <h3>FARE:</h3>

        </div>

    </div>
