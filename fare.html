<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="main.js"></script>

</head>
<body>
<!-- header     -->
    <header id="headerM" class="navbar navbar-expand-sm navbar-dark bg-dark">
        <div class="container-fluid">

            <a class="navbar-brand" href="#">
                <img src="Logo.png" alt="Avatar Logo" style="width:40px;"> 
            </a>
            
            <div class="collapse navbar-collapse" id="mynavbar">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"> <a class="nav-link" href="Home.html" target="_self">Home</a></li>
                    <li class="nav-item"> <a class="nav-link" href="fare.html" target="_self">Fare Matrix</a></li>
                    <li class="nav-item"> <a class="nav-link" href="Sched.html" target="_self">Schedule</a></li>
                    <li class="nav-item"> <a class="nav-link" href="Help.html" target="_self">Help</a></li>
                </ul>
            </div>

            <button type="button" class="btn btn-link">Book Now!</button>
            <button type="button" class="btn btn-info">Create Account</button>
        </div>
    </header>
<!-- end of header -->

<!-- footer -->
     <div>
        <footer class="text-center py-3 bg-dark text-light mt-auto fixed-bottom">
            &copy; Eliana De La Cruz | 9-Sapphire @2026
        </footer>
    </div>
<!-- end of footer -->

<!-- main div -->
    <div id="MC" class="container container-fluid">
        <div id="header">
            <h2>eSakayMo Fare Matrix</h2>
        </div>

        <img id="img" src="ss.png" alt="image" width="350" height="350">

        <div id="upNoff" class="container-fluid">
            <h3>PICK-UP LOCATION</h3>
            <select id="pickUp" class="form-select form-select-sm" aria-label=".form-select-sm example">
                <option selected>Choose pick-up location</option>
                <option value="1" id="sta1">Recto</option>
                <option value="2" id="sta2">Legarda</option>
                <option value="3" id="sta3">Pureza</option>
                <option value="4" id="sta4">V. Mapa</option>
                <option value="5" id="sta5">J. Ruiz</option>
                <option value="6" id="sta6">Gilmore</option>
                <option value="7" id="sta7">Betty Go-Belmonte</option>
                <option value="8" id="sta8">Araneta Center-Cubao</option>
                <option value="9" id="sta9">Anonas</option>
                <option value="10" id="sta10">Katipunan</option>
                <option value="11" id="sta11">Santolan</option>
                <option value="12" id="sta12">Marikina-Pasig</option>
                <option value="13" id="sta13">Antipolo</option>
            </select>

                
            <h3>DROP-OFF LOCATION</h3>
            <select id="dropOff" class="form-select form-select-sm" aria-label=".form-select-sm example">
                <option selected>Choose drop-off location</option>
                <option value="1" id="tO">Recto</option>
                <option value="2" id="dA">Legarda</option>
                <option value="3" id="zA">Pureza</option>
                <option value="4" id="pA">V. Mapa</option>
                <option value="5" id="iZ">J. Ruiz</option>
                <option value="6" id="rE">Gilmore</option>
                <option value="7" id="tE">Betty Go-Belmonte</option>
                <option value="8" id="aO">Araneta Center-Cubao</option>
                <option value="9" id="aS">Anonas</option>
                <option value="10" id="kaN">Katipunan</option>
                <option value="11" id="saN">Santolan</option>
                <option value="12" id="iG">Marikina-Pasig</option>
                <option value="13" id="lO">Antipolo</option>
            </select>
                <button type="button" class="btn btn-primary" onclick="seeFare()">Regular Fare</button>
                <button type="button" class="btn btn-info" onclick="discFare()">Discounted Fare</button>
        </div>
        <h3>FARE:</h3>
        <div id="fare"></div>

    </div>
    <script src="proj.js"></script>
</body>
</html>
